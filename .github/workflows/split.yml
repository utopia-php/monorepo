name: Split

on:
  push:
    branches: [main]
    tags: ['*/*']
  workflow_dispatch:

concurrency:
  group: split
  cancel-in-progress: false

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # the persisted GITHUB_TOKEN header would override the app token on push
          persist-credentials: false

      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.SPLIT_APP_ID }}
          private-key: ${{ secrets.SPLIT_APP_PRIVATE_KEY }}
          owner: utopia-php

      - name: Split packages
        env:
          SPLIT_REMOTE_BASE: https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/utopia-php
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            bin/monorepo split "${GITHUB_REF_NAME%%/*}" --tag="${GITHUB_REF_NAME#*/}"
          else
            bin/monorepo split
          fi
