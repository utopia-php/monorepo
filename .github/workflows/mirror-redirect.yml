name: Mirror Redirect

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string

permissions:
  issues: write
  pull-requests: write

jobs:
  redirect:
    runs-on: ubuntu-latest
    steps:
      - name: Redirect pull request to the monorepo
        if: github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE: ${{ inputs.package }}
          PR: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr comment "$PR" --body "Thanks for contributing! This repository is a read-only mirror; development for this library happens in [\`packages/$PACKAGE\`](https://github.com/utopia-php/monorepo/tree/main/packages/$PACKAGE) in the [utopia-php monorepo](https://github.com/utopia-php/monorepo). Please open this pull request there instead."
          gh pr close "$PR"

      - name: Redirect issue to the monorepo
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.html_url }}
          PACKAGE: ${{ inputs.package }}
        run: |
          gh issue comment "$ISSUE" --body "Thanks for opening this! This repository is a read-only mirror; issue tracking for this library happens in [\`packages/$PACKAGE\`](https://github.com/utopia-php/monorepo/tree/main/packages/$PACKAGE) in the [utopia-php monorepo](https://github.com/utopia-php/monorepo). Please open this issue there instead."
          gh issue close "$ISSUE"
