StylesPath = .vale/styles
MinAlertLevel = warning
Vocab = Utopia

[*.md]
BasedOnStyles = Vale, Utopia
; Vocab casing is enforced by Utopia.Terms instead — Vale.Terms false-positives
; on substrings like "utopia-php" and "security@appwrite.io".
Vale.Terms = NO

; Boilerplate, legal, and agent-instruction files are not documentation.
[*{CHANGELOG,LICENSE,CODE_OF_CONDUCT,CONTRIBUTING,CLAUDE,AGENTS}.md]
BasedOnStyles =

; Vendored third-party spec texts (RFCs, PSRs) are quoted verbatim.
[packages/*/docs/{rfc,psr}/*.md]
BasedOnStyles =
