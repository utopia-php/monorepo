services:
  redis:
    image: redis:alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

  redis-cluster:
    image: redis:alpine
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        for port in 17000 17001 17002; do
          mkdir -p "/data/$${port}"
          redis-server \
            --port "$${port}" \
            --bind 0.0.0.0 \
            --protected-mode no \
            --appendonly no \
            --cluster-enabled yes \
            --cluster-config-file "/data/$${port}/nodes.conf" \
            --cluster-node-timeout 5000 \
            --cluster-announce-ip 127.0.0.1 \
            --cluster-announce-port "$${port}" \
            --cluster-announce-bus-port "$$((port + 10000))" &
        done
        until redis-cli -p 17000 ping > /dev/null 2>&1; do sleep 1; done
        redis-cli --cluster create \
          127.0.0.1:17000 \
          127.0.0.1:17001 \
          127.0.0.1:17002 \
          --cluster-replicas 0 \
          --cluster-yes
        wait
    ports:
      - "17000-17002:17000-17002"
    healthcheck:
      test: ["CMD-SHELL", "for p in 17000 17001 17002; do redis-cli -p $$p cluster info | grep -q cluster_state:ok || exit 1; done"]
      interval: 2s
      timeout: 5s
      retries: 30
